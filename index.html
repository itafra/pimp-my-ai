<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pimpmy.ai</title>
<style>
  :root {
    --bg: #0b0b10;
    --bg-accent: #15151f;
    --fg: #f5f5f7;
    --fg-muted: #9a9aa8;
    --accent: #7c5cff;
    --accent-2: #ff5c97;
    --radius: 14px;
    --max-width: 720px;
    --space: 1.5rem;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: radial-gradient(circle at top, var(--bg-accent), var(--bg));
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: var(--space);
  }

  .cf-hero {
    max-width: var(--max-width);
    text-align: center;
  }

  .cf-hero h1 {
    font-size: clamp(2.25rem, 6vw, 3.5rem);
    margin: 0 0 1rem;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .cf-hero p {
    color: var(--fg-muted);
    font-size: 1.125rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }

  .cf-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }

  .cf-tags span {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: var(--radius);
    padding: 0.4rem 0.9rem;
    font-size: 0.875rem;
    color: var(--fg-muted);
  }
</style>
</head>
<body>
  <main class="cf-hero">
    <h1>pimpmy.ai</h1>
    <p>Coming soon &mdash; this page is the placeholder while the real thing gets built.</p>
    <div class="cf-tags">
      <span>AI</span>
      <span>Tools</span>
      <span>Coming Soon</span>
    </div>
  </main>
</body>
</html>
